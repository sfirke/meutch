{% if shared_circles %}
<div class="{{ shared_circles_container_class|default('mt-3') }}">
    <div class="d-flex flex-wrap align-items-center gap-2">
        <span class="fw-semibold text-body">Circles in common:</span>
        {% for circle in shared_circles %}
            <a href="{{ url_for('circles.view_circle', circle_id=circle.id) }}" class="badge rounded-pill text-bg-light border text-decoration-none">
                {{ circle.name }}
            </a>
        {% endfor %}
    </div>
</div>
{% endif %}
